<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>สรุปลงเวลาวันนี้ — SSB</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#4A7C3F;--green-d:#2d5a24;--green-l:#D6E8D0;--green-pale:#EEF7EB;
  --brown:#8B7355;--cream:#F5F0E8;--cream2:#EDE7D9;--cream3:#FDFAF5;
  --text:#2C3E1F;--text-m:#5C6B4A;--text-l:#8B9E7A;
  --border:rgba(74,124,63,.18);--red:#DC2626;--red-l:#FEE2E2;
  --orange:#EA580C;--orange-l:#FFF4E8;--blue:#1D4ED8;--blue-l:#E4ECFF;
  --brown-l:#F1EBE2;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sarabun',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}

.hdr{background:linear-gradient(135deg,var(--green-d),var(--green));padding:16px;position:sticky;top:0;z-index:10}
.hdr-top{display:flex;align-items:center;gap:10px}
.hdr-logo{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px}
.hdr h1{font-size:17px;font-weight:600;color:#fff}
.hdr p{font-size:11px;color:var(--green-l);margin-top:2px}
.btn-refresh{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:999px;padding:7px 13px;font-size:12px;font-weight:600;font-family:inherit;display:flex;align-items:center;gap:5px;cursor:pointer}
.btn-refresh:active{opacity:.8}
.btn-refresh.loading{opacity:.7;pointer-events:none}
.btn-refresh .ico{display:inline-block}
.btn-refresh.spin .ico{animation:spin .7s linear infinite}

.body{padding:14px;max-width:520px;margin:0 auto}

/* ── KPI ── */
.kpi-hint{font-size:11.5px;color:var(--text-l);text-align:center;margin:2px 0 10px}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
.kpi{background:var(--cream3);border:1px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;transition:transform .08s,box-shadow .15s;position:relative}
.kpi:active{transform:scale(.97)}
.kpi.on{box-shadow:0 0 0 2px var(--green) inset}
.kpi .n{font-size:24px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.kpi .l{font-size:11.5px;color:var(--text-m);margin-top:5px;display:flex;align-items:center;justify-content:center;gap:3px}
.kpi.total .n{color:var(--text)} .kpi.present .n{color:var(--green)}
.kpi.leave .n{color:var(--blue)} .kpi.absent .n{color:var(--red)}
.kpi.outp .n{color:var(--brown)} .kpi.full8 .n{color:var(--green-d);font-size:20px}
.kpi .tag-set{position:absolute;top:6px;right:7px;font-size:9px;color:var(--text-l);background:var(--cream2);border-radius:999px;padding:1px 6px}
.forgot-bar{background:var(--orange-l);border:1px solid #FCD9B6;color:var(--orange);border-radius:12px;padding:9px 14px;font-size:12.5px;font-weight:600;text-align:center;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:6px}
.hours-stat{background:var(--green-pale);border:1px solid var(--border);color:var(--green-d);border-radius:12px;padding:10px 14px;font-size:13px;font-weight:600;text-align:center;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px}
.hours-stat b{font-size:16px;font-weight:700}

/* ── รายชื่อ ── */
.list-head{display:flex;align-items:center;justify-content:space-between;margin:0 2px 9px}
.list-head .t{font-size:13px;font-weight:600;color:var(--brown);letter-spacing:.03em}
.list-head .clear{font-size:12px;color:var(--green);background:none;border:none;font-family:inherit;font-weight:600;cursor:pointer;display:none}
.list-head .clear.show{display:inline}

.row{display:flex;align-items:center;gap:9px;background:var(--cream3);border:1px solid var(--border);border-radius:12px;padding:9px 10px;margin-bottom:7px}
.row .idbox{flex-shrink:0;width:52px;text-align:center;background:var(--cream2);border-radius:8px;padding:4px 4px}
.row .idbox .code{font-size:10.5px;font-weight:700;color:var(--green-d)}
.row .idbox .plate{font-size:9px;color:var(--text-m);margin-top:1px;word-break:break-all;line-height:1.25}
.row .mid{flex:1;min-width:0;cursor:pointer}
.row .nm{font-size:13.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .sub{display:flex;align-items:center;gap:7px;margin-top:3px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;border-radius:999px;padding:1px 7px}
.b-present{background:var(--green-pale);color:var(--green-d)}
.b-forgot{background:var(--orange-l);color:var(--orange)}
.b-leave{background:var(--blue-l);color:var(--blue)}
.b-outp{background:var(--brown-l);color:var(--brown)}
.b-absent{background:var(--red-l);color:var(--red)}
.veh{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;color:var(--text-m);white-space:nowrap}
.veh .dot{width:7px;height:7px;border-radius:50%;background:var(--text-l);flex-shrink:0}
.veh.run .dot{background:#16A34A}.veh.idle .dot{background:var(--orange)}
.veh.park .dot{background:#9CA3AF}.veh.off .dot{background:#6B7280}
.veh.offline .dot{background:var(--red)}.veh.none .dot{background:#D9D4C8}
.row .rt{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.row .io{font-size:11px;font-variant-numeric:tabular-nums;white-space:nowrap;text-align:right;line-height:1.35}
.row .io .i{color:var(--green);font-weight:700}.row .io .o{color:var(--orange);font-weight:700}.row .io .e{color:var(--text-l)}
.row .io .hrs{font-size:10px;color:var(--text-m);font-weight:600;margin-top:1px}
.row .ic{display:flex;gap:5px}
.iconbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:14px;text-decoration:none;color:var(--text-m);cursor:pointer}
.iconbtn.call{background:var(--green);color:#fff;border:none}
.iconbtn.dis{opacity:.32;pointer-events:none}
.iconbtn:active{opacity:.8}

.empty{background:var(--cream3);border:1px dashed var(--border);border-radius:14px;padding:34px 18px;text-align:center;color:var(--text-l);font-size:13.5px}

/* ── Loading / error ── */
#load{position:fixed;inset:0;background:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9000}
.spinner{width:38px;height:38px;border-radius:50%;border:4px solid var(--green-l);border-top-color:var(--green);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#load p{font-size:14px;color:var(--text-m)}

/* ── Bottom sheet ── */
#sheet{position:fixed;inset:0;z-index:9500;display:none}
#sheet.show{display:block}
.sheet-bg{position:absolute;inset:0;background:rgba(44,62,31,.45)}
.sheet-panel{position:absolute;left:0;right:0;bottom:0;background:var(--cream3);border-radius:20px 20px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));max-height:82vh;overflow-y:auto;animation:up .22s ease-out}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-grab{width:42px;height:4px;background:var(--cream2);border-radius:99px;margin:0 auto 14px}
.sheet-title{font-size:16px;font-weight:700;text-align:center;margin-bottom:3px}
.sheet-sub{font-size:12.5px;color:var(--text-m);text-align:center;margin-bottom:16px}
.opt{display:flex;align-items:center;gap:11px;width:100%;background:var(--cream);border:1px solid var(--border);border-radius:13px;padding:13px 15px;margin-bottom:9px;font-size:14.5px;font-weight:600;font-family:inherit;color:var(--text);cursor:pointer}
.opt:active{opacity:.85}.opt .em{font-size:19px}
.opt.cur{box-shadow:0 0 0 2px var(--green) inset}.opt .chk{margin-left:auto;color:var(--green);font-weight:700;display:none}
.opt.cur .chk{display:inline}
.opt.clear{color:var(--red)}
/* bulk mode */
.bulk-item{display:flex;align-items:center;gap:11px;width:100%;background:var(--cream);border:1px solid var(--border);border-radius:12px;padding:11px 14px;margin-bottom:8px;cursor:pointer}
.bulk-item:active{opacity:.85}
.bulk-box{width:22px;height:22px;border-radius:7px;border:2px solid var(--text-l);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.bulk-item.on .bulk-box{background:var(--green);border-color:var(--green)}
.bulk-meta{flex:1;min-width:0}.bulk-meta .n{font-size:14px;font-weight:600}
.bulk-meta .s{font-size:11px;color:var(--text-l)}
.sheet-save{width:100%;background:var(--green);color:#fff;border:none;border-radius:13px;padding:14px;font-size:15px;font-weight:700;font-family:inherit;margin-top:6px;cursor:pointer}
.sheet-save:active{opacity:.9}
.sheet-save:disabled{opacity:.5}
.sheet-cancel{width:100%;background:none;border:none;color:var(--text-m);font-size:13.5px;font-family:inherit;padding:12px;margin-top:2px;cursor:pointer}

/* ── Toast ── */
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--green-d);color:#fff;font-size:13.5px;font-weight:600;padding:11px 20px;border-radius:999px;z-index:9999;opacity:0;transition:.25s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="load"><div class="spinner"></div><p>กำลังโหลดข้อมูล...</p></div>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-logo">🕐</div>
    <div style="flex:1">
      <h1>สรุปลงเวลาวันนี้</h1>
      <p id="hdr-date">—</p>
    </div>
    <button class="btn-refresh" id="btn-refresh" onclick="load(true)"><span class="ico">🔄</span> รีเฟรช</button>
  </div>
</div>

<div class="body" id="body" style="display:none">
  <p class="kpi-hint">แตะการ์ดด้านบนเพื่อกรองรายชื่อ · ตั้งสถานะ (ลา/ขาด/ต่างจังหวัด) แตะที่ชื่อแต่ละคน</p>
  <div class="kpi-grid" id="kpi"></div>
  <div class="hours-stat" id="hours-stat" style="display:none"></div>
  <div class="forgot-bar" id="forgot-bar" style="display:none"></div>

  <div class="list-head">
    <span class="t" id="list-title">รายชื่อทั้งหมด</span>
    <button class="clear" id="list-clear" onclick="setFilter('all')">✕ ล้างตัวกรอง</button>
  </div>
  <div id="list"></div>
</div>

<div id="sheet"><div class="sheet-bg" onclick="closeSheet()"></div><div class="sheet-panel" id="sheet-panel"></div></div>
<div id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw4UvKuRrAQ_3Ldm8U0VJqfjfBQUSYaTEdrxkdXUVN98G68XseCquhDeXfMgU8cVYaY/exec';
// 🔧 ใส่ LIFF ID ของหน้านี้ (สร้างใหม่แล้วเอามาใส่ + เพิ่มคีย์ LIFF_ID_AttendSummary ในชีต LINE_OA ด้วย)
const LIFF_ID = '2010274217-gPYFX8U7';

const STATUS_META = {
  present:    { label:'เข้างาน',        cls:'b-present', em:'🟢' },
  forgot:     { label:'มา · ลืมเช็คอิน', cls:'b-forgot',  em:'⚠️' },
  leave:      { label:'ลา',             cls:'b-leave',   em:'📋' },
  outprovince:{ label:'ต่างจังหวัด',     cls:'b-outp',    em:'🚚' },
  absent:     { label:'ขาด',            cls:'b-absent',  em:'🔴' },
};
// สถานะที่ตั้งเองได้ (ส่งไป backend เป็นภาษาไทย)
const SETTABLE = [
  { key:'leave',       th:'ลา',           em:'📋' },
  { key:'absent',      th:'ขาด',          em:'🔴' },
  { key:'outprovince', th:'ไปต่างจังหวัด', em:'🚚' },
];

let ADMIN_UID = '';
let DATA = null;
let FILTER = 'all';

function esc(s){ const d=document.createElement('div'); d.textContent=(s==null)?'':String(s); return d.innerHTML; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }

async function init(){
  try{
    await liff.init({ liffId: LIFF_ID });
    if(!liff.isLoggedIn()){ liff.login(); return; }
    const p = await liff.getProfile();
    ADMIN_UID = p.userId;
    await load(false);
  }catch(e){
    document.getElementById('load').innerHTML =
      '<p style="color:var(--red);padding:0 30px;text-align:center">เปิดผ่าน LINE เพื่อใช้งาน<br><span style="font-size:12px;color:var(--text-l)">'+esc(e.message||e)+'</span></p>';
  }
}

async function load(isRefresh){
  const rb = document.getElementById('btn-refresh');
  if(isRefresh){ rb.classList.add('spin','loading'); }
  try{
    const res = await fetch(GAS_URL + '?action=getAttendanceSummary&userId=' + encodeURIComponent(ADMIN_UID) + '&t=' + Date.now());
    const d = await res.json();
    if(!d.success){
      const msg = d.error==='unauthorized' ? 'หน้านี้สำหรับแอดมินเท่านั้น' : (d.error||'เกิดข้อผิดพลาด');
      if(!isRefresh) document.getElementById('load').innerHTML = '<p style="color:var(--red);text-align:center;padding:0 30px">'+esc(msg)+'</p>';
      else toast(msg);
      return;
    }
    DATA = d;
    document.getElementById('hdr-date').textContent = 'ประจำวันที่ ' + esc(d.date);
    document.getElementById('load').style.display = 'none';
    document.getElementById('body').style.display = 'block';
    render();
    if(isRefresh) toast('อัปเดตแล้ว');
  }catch(e){
    if(!isRefresh) document.getElementById('load').innerHTML = '<p style="color:var(--red)">เชื่อมต่อไม่ได้</p>';
    else toast('โหลดไม่สำเร็จ');
  }finally{
    if(isRefresh) rb.classList.remove('spin','loading');
  }
}

function render(){ renderKpi(); renderList(); }

function renderKpi(){
  const c = DATA.counts;
  const cards = [
    { f:'all',         cls:'total',   n:c.total,       label:'👥 ทั้งหมด' },
    { f:'present',     cls:'present', n:c.present,     label:'🟢 เข้างาน' },
    { f:'leave',       cls:'leave',   n:c.leave,       label:'📋 ลา' },
    { f:'absent',      cls:'absent',  n:c.absent,      label:'🔴 ขาด' },
    { f:'outprovince', cls:'outp',    n:c.outprovince, label:'🚚 ต่างจังหวัด' },
    { f:'full8',       cls:'full8',   n:(c.full8||0)+'/'+c.total, label:'✅ ครบ 8 ชม.' },
  ];
  document.getElementById('kpi').innerHTML = cards.map(k =>
    '<div class="kpi '+k.cls+(FILTER===k.f?' on':'')+'" onclick="setFilter(FILTER===\''+k.f+'\'?\'all\':\''+k.f+'\')">'
    + '<div class="n">'+k.n+'</div><div class="l">'+k.label+'</div></div>'
  ).join('');

  const fb = document.getElementById('forgot-bar');
  if(c.forgot > 0){
    fb.style.display = 'flex';
    fb.innerHTML = '⚠️ มี <b>&nbsp;'+c.forgot+' คน&nbsp;</b> มาทำงานแต่ลืมเช็คอิน — แตะ "เข้างาน" เพื่อดู';
  }else fb.style.display = 'none';

  const hs = document.getElementById('hours-stat');
  if(c.totalHours != null && c.totalHours > 0){
    hs.style.display = 'flex';
    hs.innerHTML = '⏱️ รวม <b>&nbsp;'+c.totalHours+'&nbsp;</b> ชม. · เฉลี่ย <b>&nbsp;'+(c.avgHours||0)+'&nbsp;</b> ชม./คน';
  }else hs.style.display = 'none';
}

function setFilter(f){ FILTER = f; render(); window.scrollTo({top:0,behavior:'smooth'}); }

function visibleDrivers(){
  if(FILTER==='all') return DATA.drivers;
  if(FILTER==='present') return DATA.drivers.filter(d=>d.status==='present'); // รวมลืมเช็คอิน
  if(FILTER==='full8')   return DATA.drivers.filter(d=>parseFloat(d.hours)>=8);
  return DATA.drivers.filter(d=>d.status===FILTER);
}

function renderList(){
  const items = visibleDrivers();
  const titleMap = { all:'รายชื่อทั้งหมด', present:'คนเข้างาน', leave:'คนลา', absent:'คนขาด', outprovince:'ไปต่างจังหวัด', full8:'คนทำงานครบ 8 ชม.' };
  document.getElementById('list-title').textContent = (titleMap[FILTER]||'รายชื่อ') + ' · ' + items.length + ' คน';
  document.getElementById('list-clear').classList.toggle('show', FILTER!=='all');

  if(items.length===0){
    document.getElementById('list').innerHTML = '<div class="empty">ไม่มีรายชื่อในหมวดนี้</div>';
    return;
  }
  document.getElementById('list').innerHTML = items.map(rowHtml).join('');
}

const VEH_DOT = { run:'run', idle:'idle', park:'park', off:'off', offline:'offline', none:'none', other:'park' };

function rowHtml(d){
  const sKey = d.forgot ? 'forgot' : d.status;
  const meta = STATUS_META[sKey];
  const phone = (d.phone||'').replace(/[^0-9+]/g,'');
  const setTag = d.manual ? ' (ตั้งเอง)' : (d.autoUpc ? ' (GPS)' : '');

  // ต่างจังหวัด → ต่อท้ายชื่อจังหวัด + ระยะ
  let badgeTxt = meta.label + esc(setTag);
  if(d.status==='outprovince' && d.prov){
    badgeTxt += ' · ' + esc(d.prov) + (d.distKm!=null ? ' '+esc(d.distKm)+' กม.' : '');
  }

  // เวลาเข้า/ออก + รวมชั่วโมง
  const io = '<span class="'+(d.checkIn?'i':'e')+'">'+(d.checkIn||'—')+'</span>'
           + ' <span class="e">/</span> '
           + '<span class="'+(d.checkOut?'o':'e')+'">'+(d.checkOut||'—')+'</span>'
           + (d.hours!=='' && d.hours!=null ? '<div class="hrs">รวม '+esc(d.hours)+' ชม.</div>' : '');

  // สถานะรถ
  const vcls = VEH_DOT[d.vehicleCode] || 'none';
  const veh = '<span class="veh '+vcls+'"><span class="dot"></span>'+esc(d.vehicle||'—')+'</span>';

  // ปุ่มพิกัด (เปิด Google Maps) + ปุ่มโทร
  const mapBtn = d.gps
    ? '<a class="iconbtn" href="https://maps.google.com/?q='+esc(d.gps)+'" target="_blank" rel="noopener" title="ดูพิกัด">📍</a>'
    : '<span class="iconbtn dis" title="ไม่มีพิกัด">📍</span>';
  const callBtn = phone
    ? '<a class="iconbtn call" href="tel:'+phone+'" title="โทร">📞</a>'
    : '<span class="iconbtn call dis" title="ไม่มีเบอร์">📞</span>';

  return ''
  + '<div class="row">'
  +   '<div class="idbox"><div class="code">'+esc(d.code||'—')+'</div><div class="plate">'+esc(d.plate||'—')+'</div></div>'
  +   '<div class="mid" onclick="openSingleSheet(\''+esc(d.uid)+'\')">'
  +     '<div class="nm">'+esc(d.name||'(ไม่มีชื่อ)')+'</div>'
  +     '<div class="sub">'
  +       '<span class="badge '+meta.cls+'">'+meta.em+' '+badgeTxt+'</span>'
  +       veh
  +     '</div>'
  +   '</div>'
  +   '<div class="rt">'
  +     '<div class="io">'+io+'</div>'
  +     '<div class="ic">'+mapBtn+callBtn+'</div>'
  +   '</div>'
  + '</div>';
}

/* ── Bottom sheet : เปลี่ยนสถานะคนเดียว ── */
function openSingleSheet(uid){
  const d = DATA.drivers.find(x=>x.uid===uid); if(!d) return;
  const curManual = d.manual ? d.status : '';
  let html = '<div class="sheet-grab"></div>'
    + '<div class="sheet-title">'+esc(d.name||d.code)+'</div>'
    + '<div class="sheet-sub">'+esc(d.code)+' · '+esc(d.plate||'—')+'</div>';
  SETTABLE.forEach(s=>{
    html += '<button class="opt'+(curManual===s.key?' cur':'')+'" onclick="setOne(\''+esc(uid)+'\',\''+s.th+'\')">'
          + '<span class="em">'+s.em+'</span>'+s.th+'<span class="chk">✓</span></button>';
  });
  html += '<button class="opt clear" onclick="setOne(\''+esc(uid)+'\',\'clear\')">↩️ ล้างสถานะ (ใช้ค่าอัตโนมัติ)</button>'
        + '<button class="sheet-cancel" onclick="closeSheet()">ยกเลิก</button>';
  openSheet(html);
}

async function setOne(uid, statusTh){
  closeSheet();
  toast('กำลังบันทึก...');
  const r = await post({ action:'setAttendanceStatus', userId:ADMIN_UID, targetUid:uid, status:statusTh });
  if(r && r.success){ toast('บันทึกแล้ว'); await load(false); }
  else toast('ไม่สำเร็จ: ' + ((r&&r.error)||'')); 
}

/* ── Bottom sheet : ตั้งสถานะหลายคน (จาก KPI) ── */
/* ── sheet utils ── */
function openSheet(html){ document.getElementById('sheet-panel').innerHTML = html; document.getElementById('sheet').classList.add('show'); }
function closeSheet(){ document.getElementById('sheet').classList.remove('show'); }

async function post(payload){
  const res = await fetch(GAS_URL, {
    method:'POST', headers:{ 'Content-Type':'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  return res.json();
}

init();
</script>
